<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jackrabbit AI Relay Control</title>
    <style>
        /* General Layout */
        body { font-family: sans-serif; background: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .bubble { max-width: 85%; padding: 12px; border-radius: 10px; line-height: 1.5; font-size: 14px; }
        .user { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 0; white-space: pre-wrap; }
        .ai { align-self: flex-start; background: #fff; border-bottom-left-radius: 0; box-shadow: 0 1px 1px rgba(0,0,0,0.1); white-space: pre-wrap; }

        /* Settings Bar */
        #settings-bar {
            background: #f0f0f0;
            padding: 10px 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            border-top: 1px solid #ccc;
            border-bottom: 1px solid #ddd;
            font-size: 12px;
            color: #444;
        }

        .setting-group { display: flex; flex-direction: column; gap: 3px; }
        
        select, input[type="text"] {
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
        }

        /* Input Area */
        #input-area { background: #f0f0f0; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        textarea { 
            flex: 1; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 10px; 
            outline: none; 
            font-family: sans-serif; 
            font-size: 14px; 
            resize: none; 
            min-height: 80px;
        }
        
        .controls { display: flex; justify-content: space-between; align-items: center; }
        .hint { font-size: 11px; color: #888; }
        
        button { background: #075e54; color: white; border: none; padding: 10px 30px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #999; }
        .thinking { font-size: 12px; color: #075e54; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="chat-window">
        <div class="bubble ai">Relay Secure. Select your Engine and Model below to begin.</div>
    </div>

    <!-- Configuration Settings Bar -->
    <div id="settings-bar">
        <div class="setting-group">
            <label>Engine</label>
            <select id="engine-select">
                <option value="default" selected>Default</option>
                <option value="openai">OpenAI</option>
                <option value="googleai">Gemini</option>
                <option value="xai">xAI</option>
                <option value="openrouter">OpenRouter</option>
                <option value="togetherai">TogetherAI</option>
                <option value="huggingface">HuggingFace</option>
                <option value="cohere">Cohere</option>
                <option value="anthropic">Anthropic</option>
                <option value="perplexity">Perplexity</option>
                <option value="mistral">Mistral</option>
            </select>
        </div>

        <div class="setting-group">
            <label>Model</label>
            <input type="text" id="model-input" value="Default" style="width: 120px;">
        </div>

        <div class="setting-group">
            <label>Tokens</label>
            <input type="text" id="token-input" value="Default" style="width: 80px;">
        </div>

        <div class="setting-group">
            <label>Persona</label>
            <select id="persona-select">
                <option value="None" selected>None</option>
                <option value="Koiki">Koiki</option>
                <option value="Magnus">Magnus</option>
            </select>
        </div>
    </div>

    <!-- Multi-paragraph Input Area -->
    <div id="input-area">
        <div id="thinking" class="thinking">Jackrabbit AI is thinking...</div>
        <textarea id="user-input" placeholder="Type your paragraphs here..."></textarea>
        
        <div class="controls">
            <span class="hint">Shift+Enter for New Line | Enter to Send</span>
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const thinking = document.getElementById('thinking');

        // Settings Elements
        const engineSelect = document.getElementById('engine-select');
        const modelInput = document.getElementById('model-input');
        const tokenInput = document.getElementById('token-input');
        const personaSelect = document.getElementById('persona-select');

        // Session Memory ID
        const userId = "web_user_" + Math.random().toString(36).substring(7);

        function addBubble(text, role) {
            const div = document.createElement('div');
            div.className = `bubble ${role}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function send() {
            const msg = userInput.value.trim();
            if (!msg) return;

            // Capture current settings values
            const payload = {
                message: msg,
                user_id: userId,
                engine: engineSelect.value,
                model: modelInput.value,
                tokens: tokenInput.value,
                persona: personaSelect.value
            };

            addBubble(msg, 'user');
            userInput.value = '';
            
            userInput.disabled = true;
            sendBtn.disabled = true;
            thinking.style.display = 'block';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                addBubble(data.reply || "Error: " + (data.message || "Unknown error"), 'ai');
            } catch (e) {
                addBubble("Fatal: Could not communicate with Relay Server.", 'ai');
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                thinking.style.display = 'none';
                userInput.focus();
            }
        }

        sendBtn.onclick = send;

        // Enter key handler
        userInput.onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        };
    </script>
</body>
</html>
