<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ServiAI Chat</title>

    <!-- Markdown + Sanitizer -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

    <!-- Prism.js for syntax highlighting -->
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.30.0/themes/prism-tomorrow.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.30.0/prism.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.30.0/components/prism-python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.30.0/components/prism-json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.30.0/components/prism-javascript.min.js"></script>

    <style>
        body { font-family: sans-serif; background: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 85%; padding: 12px; border-radius: 10px; line-height: 1.5; font-size: 14px; }
        .user { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 0; white-space: pre-wrap; }
        .assistant { align-self: flex-start; background: #fff; border-bottom-left-radius: 0; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }

        /* Markdown Styling */
        .assistant p { margin: 0 0 8px 0; }
        .assistant pre { background: #1e1e1e; color: #ddd; padding: 10px; border-radius: 6px; overflow-x: auto; }
        .assistant code { background: #eee; padding: 2px 4px; border-radius: 4px; }
        .assistant pre code { background: none; padding: 0; display: block; }
        .assistant ul, .assistant ol { padding-left: 20px; margin: 5px 0; }
        .assistant table { border-collapse: collapse; width: 100%; }
        .assistant th, .assistant td { border: 1px solid #ccc; padding: 6px; }

        #settings-bar { background: #f0f0f0; padding: 10px 15px; display: flex; flex-wrap: wrap; gap: 15px; border-top: 1px solid #ccc; border-bottom: 1px solid #ddd; font-size: 12px; color: #444; }
        .setting-group { display: flex; flex-direction: column; gap: 3px; }
        select, input[type="text"] { padding: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }

        #input-area { background: #f0f0f0; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        textarea { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 10px; outline: none; font-family: sans-serif; font-size: 14px; resize: none; min-height: 80px; }
        .controls { display: flex; justify-content: space-between; align-items: center; }
        .hint { font-size: 11px; color: #888; }
        button { background: #075e54; color: white; border: none; padding: 10px 30px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #999; }
        .thinking { font-size: 12px; color: #075e54; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="chat-window">
        <div class="bubble assistant">Select your Engine and Model below to begin.</div>
    </div>

    <div id="settings-bar">
        <div class="setting-group">
            <label>Engine</label>
            <select id="engine-select">
                <option value="default" selected>Default</option>
                <option value="openai">OpenAI</option>
                <option value="googleai">Gemini</option>
                <option value="xai">xAI</option>
                <option value="openrouter">OpenRouter</option>
                <option value="togetherai">TogetherAI</option>
                <option value="huggingface">HuggingFace</option>
                <option value="cohere">Cohere</option>
                <option value="anthropic">Anthropic</option>
                <option value="perplexity">Perplexity</option>
                <option value="mistral">Mistral</option>
            </select>
        </div>

        <div class="setting-group">
            <label>Model</label>
            <input type="text" id="model-input" value="Default" style="width: 120px;">
        </div>

        <div class="setting-group">
            <label>Tokens</label>
            <input type="text" id="token-input" value="Default" style="width: 80px;">
        </div>

        <div class="setting-group">
            <label>Persona</label>
            <select id="persona-select">
                <option value="None" selected>None</option>
                <option value="Koiki">Koiki</option>
                <option value="Magnus">Magnus</option>
            </select>
        </div>
    </div>

    <div id="input-area">
        <div id="thinking" class="thinking">ServiAI processing...</div>
        <textarea id="user-input" placeholder="Type your paragraphs here..."></textarea>
        <div class="controls">
            <span class="hint">Shift+Enter for New Line | Enter to Send</span>
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const thinking = document.getElementById('thinking');

        const engineSelect = document.getElementById('engine-select');
        const modelInput = document.getElementById('model-input');
        const tokenInput = document.getElementById('token-input');
        const personaSelect = document.getElementById('persona-select');

        // Session management - added for conversation persistence
        let sessionId;
        
        document.addEventListener("DOMContentLoaded", () => {
            sessionId = localStorage.getItem("serviai_session");
            
            if (!sessionId) {
                sessionId = "session-" + Date.now() + "-" + Math.random().toString(36).substring(7);
                localStorage.setItem("serviai_session", sessionId);
                
                addBubble("<b>Welcome!</b> Your session started.<br>Select Engine/Model below.", 'assistant');
                
                setTimeout(() => chatWindow.scrollTop = chatWindow.scrollHeight, 5);
            } else {
                fetchHistory();
                
                setTimeout(() => {
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                    userInput.focus();
                    
                    const lastMsg = document.querySelector("#chat-window .bubble:last-child");
                    lastMsg?.scrollIntoView({ behavior: "smooth" });
                }, 5);
                
                console.log(`Loaded saved session ${sessionId}`);
                
                setTimeout(() => addBubble("<b>Back online!</b>", 'assistant'), 75);
                
                setTimeout(() => chatWindow.scrollTop = chatWindow.scrollHeight + 9999, 76);
                
                setTimeout(() => addBubble("<small>(Previous responses restored)</small>", 'assistant'), 77);
                
                setTimeout(() => {
                    document.querySelectorAll(".bubble").forEach(b => b.style.opacity = "");
                }, 78);
            }
        });

        function fetchHistory() {
            try {
                fetch("/history", {
                    headers: {
                        "Accept": "application/json",
                        "Connection": "keep-alive",
                        "Pragma": "no-cache",
                        "Cache-Control": "no-cache",
                        "X-ServiAIOpenSession": `${sessionId}`
                    }
                }).then(r => r.json()).then(d => {
                    d?.messages?.forEach(m => addBubble(m.content, m.role));
                    console.log(`Restored ${d.messages?.length || "zero"} prior exchanges`);
                }).catch(e => {
                    console.error(`Fetch failed: ${e.message}`);
                    addBubble(`<small style="color:red">⚠️ Session restore failed</small>`, 'assistant');
                });
            } catch (e) {
                console.error(e);
            }
        }

        function addBubble(text, role) {
            const div = document.createElement('div');
            div.className = `bubble ${role}`;

            if (role === 'assistant') {
                // Render Markdown safely
                let raw = marked.parse(text, { breaks: true });
                let safe = DOMPurify.sanitize(raw);
                div.innerHTML = safe;

                // Automatically detect language from ``` fences for Prism
                div.querySelectorAll('pre code').forEach((block) => {
                    const langClass = block.className || '';
                    if (!langClass.startsWith('language-')) {
                        // Default to plain text if no language specified
                        block.className = 'language-none';
                    }
                    Prism.highlightElement(block);
                });
            } else {
                div.innerText = text;
            }

            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function send() {
            const msg = userInput.value.trim();
            if (!msg) return;

            const payload = {
                message: msg,
                user_id: sessionId,  // Using session ID instead of random user ID
                engine: engineSelect.value,
                model: modelInput.value,
                tokens: tokenInput.value,
                persona: personaSelect.value
            };

            addBubble(msg, 'user');
            userInput.value = '';
            
            userInput.disabled = true;
            sendBtn.disabled = true;
            thinking.style.display = 'block';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 
                               'X-ServiAIOpenSession': sessionId },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                addBubble(data.reply || "Error: " + (data.message || "Unknown error"), 'assistant');
            } catch (e) {
                addBubble("Fatal: Could not communicate with Relay Server.", 'assistant');
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                thinking.style.display = 'none';
                userInput.focus();
            }
        }

        sendBtn.onclick = send;
        userInput.onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        };
    </script>
</body>
</html>
